name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN (SEC-13 / #193).
# Jobs only need to read repository contents (checkout, build, test).
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test backend
        run: mvn -B verify
        working-directory: backend
      - name: Product stack script tests
        run: make product-test
      - name: Validate product Docker Compose profile
        run: docker compose -f infra/docker-compose.yml --profile product config --quiet

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Test frontend
        run: npm test
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: No-dead-controls gate
        run: node scripts/check-no-dead-controls.mjs
      - name: Playwright critical subset
        run: npm run test:e2e:critical
        working-directory: frontend
        env:
          CI: 'true'
