services:
  postgres:
    image: postgres:16-alpine
    container_name: chanter-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chanter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chanter}
      POSTGRES_DB: ${POSTGRES_DB:-chanter}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chanter} -d ${POSTGRES_DB:-chanter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chanter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: chanter-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: chanter-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chanter}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chantersecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  realtime-service:
    profiles: [product]
    build:
      context: ..
      dockerfile: infra/docker/realtime-service/Dockerfile
    container_name: chanter-realtime-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REALTIME_PORT: 8087
      CHANTER_JWT_SECRET: ${CHANTER_JWT_SECRET:-chanter-local-dev-jwt-secret-32bytes!!}
      COMMUNITY_SERVICE_URL: ${COMMUNITY_SERVICE_URL:-http://host.docker.internal:8082}
      MESSAGE_SERVICE_URL: ${MESSAGE_SERVICE_URL:-http://host.docker.internal:8083}
    ports:
      - "${REALTIME_PORT:-8087}:8087"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:v1.13.1
    container_name: chanter-livekit
    profiles: [product]
    environment:
      LIVEKIT_KEYS: ${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-secret}
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

volumes:
  postgres-data:
  minio-data:
