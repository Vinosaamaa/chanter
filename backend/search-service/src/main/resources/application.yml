server:
  port: ${SEARCH_PORT:8088}

spring:
  application:
    name: search-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_search
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true
    locations: classpath:db/migration

chanter:
  community-service:
    base-url: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
  media-service:
    base-url: ${MEDIA_SERVICE_URL:http://localhost:8084}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
  message-service:
    base-url: ${MESSAGE_SERVICE_URL:http://localhost:8083}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
