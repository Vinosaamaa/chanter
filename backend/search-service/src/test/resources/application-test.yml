spring:
  datasource:
    url: jdbc:h2:mem:chanter_search;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true

chanter:
  community-service:
    base-url: http://localhost:8082
    connect-timeout-seconds: 1
    read-timeout-seconds: 1
  media-service:
    base-url: http://localhost:8084
    connect-timeout-seconds: 1
    read-timeout-seconds: 1
  message-service:
    base-url: http://localhost:8083
    connect-timeout-seconds: 1
    read-timeout-seconds: 1
