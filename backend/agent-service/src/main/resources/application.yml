server:
  port: ${AGENT_PORT:8085}

spring:
  application:
    name: agent-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_agent
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true
    locations: classpath:db/migration

chanter:
  jwt:
    secret: ${CHANTER_JWT_SECRET}
    access-token-ttl: ${CHANTER_JWT_ACCESS_TTL:15m}
  internal-service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  grounding:
    engine: ${CHANTER_GROUNDING_ENGINE:rag}
    min-retrieval-score: ${CHANTER_GROUNDING_MIN_SCORE:0.12}
    retrieval-top-k: ${CHANTER_GROUNDING_TOP_K:5}
  llm:
    enabled: ${CHANTER_LLM_ENABLED:false}
    provider: ${CHANTER_LLM_PROVIDER:ollama}
    model: ${CHANTER_LLM_MODEL:llama3.2}
    connect-timeout-seconds: 5
    read-timeout-seconds: 120
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
  embeddings:
    provider: ${CHANTER_EMBEDDINGS_PROVIDER:hashing}
    dimensions: ${CHANTER_EMBEDDINGS_DIMENSIONS:384}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      connect-timeout-seconds: 5
      read-timeout-seconds: 60
  community-service:
    base-url: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
  media-service:
    base-url: ${MEDIA_SERVICE_URL:http://localhost:8084}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
  message-service:
    base-url: ${MESSAGE_SERVICE_URL:http://localhost:8083}
    connect-timeout-seconds: 5
    read-timeout-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
