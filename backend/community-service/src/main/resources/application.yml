server:
  port: ${COMMUNITY_PORT:8082}

spring:
  application:
    name: community-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_community
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

chanter:
  internal-service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-seconds: ${AUTH_SERVICE_CONNECT_TIMEOUT_SECONDS:2}
    read-timeout-seconds: ${AUTH_SERVICE_READ_TIMEOUT_SECONDS:3}
    service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
    connect-timeout-seconds: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT_SECONDS:2}
    read-timeout-seconds: ${NOTIFICATION_SERVICE_READ_TIMEOUT_SECONDS:3}
    service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  livekit:
    url: ${LIVEKIT_URL}
    api-key: ${LIVEKIT_API_KEY}
    api-secret: ${LIVEKIT_API_SECRET}
