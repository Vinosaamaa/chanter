spring:
  datasource:
    url: jdbc:h2:mem:message-service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-h2

chanter:
  notification-service:
    base-url: http://localhost:8089
    connect-timeout-seconds: 1
    read-timeout-seconds: 1
    service-token: test-internal-service-token-for-message
