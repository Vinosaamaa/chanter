server:
  port: ${MESSAGE_PORT:8083}

spring:
  application:
    name: message-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_message
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-postgresql

chanter:
  jwt:
    secret: ${CHANTER_JWT_SECRET}
    access-token-ttl: ${CHANTER_JWT_ACCESS_TTL:15m}
  internal-service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  community-service:
    base-url: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
    connect-timeout-seconds: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT_SECONDS:2}
    read-timeout-seconds: ${NOTIFICATION_SERVICE_READ_TIMEOUT_SECONDS:3}
    service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
