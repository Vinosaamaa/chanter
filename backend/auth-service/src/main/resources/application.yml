server:
  port: ${AUTH_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_auth
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true

chanter:
  internal-service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}
  jwt:
    secret: ${CHANTER_JWT_SECRET}
    access-token-ttl: ${CHANTER_JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${CHANTER_JWT_REFRESH_TTL:7d}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
