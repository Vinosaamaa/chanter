server:
  port: ${NOTIFICATION_PORT:8089}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_notification
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true
    locations: classpath:db/migration

chanter:
  internal-service-token: ${CHANTER_INTERNAL_SERVICE_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
