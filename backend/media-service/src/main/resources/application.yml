server:
  port: ${MEDIA_PORT:8084}

spring:
  application:
    name: media-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/chanter_media
    username: ${POSTGRES_USER:chanter}
    password: ${POSTGRES_PASSWORD:chanter}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

chanter:
  community-service:
    base-url: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
  media:
    storage-dir: ${COURSE_RESOURCE_STORAGE_DIR:./data/course-resources}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
