server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: message-service-support-questions
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8083}
          order: -1
          predicates:
            - Path=/api/v1/course-channels/*/support-questions,/api/v1/course-channels/*/support-questions/**
        - id: media-service-course-resources
          uri: ${MEDIA_SERVICE_URL:http://localhost:8084}
          order: -1
          predicates:
            - Path=/api/v1/courses/*/course-resources,/api/v1/courses/*/course-resources/**,/api/v1/course-resources/**
        - id: agent-service-study-assistant
          uri: ${AGENT_SERVICE_URL:http://localhost:8085}
          order: -1
          predicates:
            - Path=/api/v1/study-servers/*/study-assistant,/api/v1/study-servers/*/study-assistant/**
        - id: community-service
          uri: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/study-servers/**,/api/v1/study-server-channels/**,/api/v1/cohorts/**,/api/v1/course-channels/**,/api/v1/courses/*/resource-access
        - id: message-service
          uri: ${MESSAGE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/friend-requests/**,/api/v1/friendships/**,/api/v1/direct-messages/**,/api/v1/user-blocks/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
