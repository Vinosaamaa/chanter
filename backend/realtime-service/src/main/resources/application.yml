server:
  port: ${REALTIME_PORT:8087}

spring:
  application:
    name: realtime-service

chanter:
  jwt:
    secret: ${CHANTER_JWT_SECRET}
    access-token-ttl: ${CHANTER_JWT_ACCESS_TTL:15m}
  community-service:
    base-url: ${COMMUNITY_SERVICE_URL:http://localhost:8082}
  message-service:
    base-url: ${MESSAGE_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
